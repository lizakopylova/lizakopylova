<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liza Kopylova</title>
  <style>
    :root {
      --bg: #f5f0ff;       /* pastel purple, very light */
      --accent: #fff5a8;   /* pastel yellow */
      --ink: #2b2b2b;
      --muted: #2b2b2b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      max-width: 360px;
      margin: 0 auto;
      padding: 96px 24px;
    }

    img.photo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 6px;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .links a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 2px solid var(--accent);
      margin-right: 16px;
    }

    .links a:hover {
      border-bottom-color: var(--ink);
    }
  </style>
</head>
<body>
  <main>
    <!-- Replace src with your own photo -->
    <img class="photo" src="JMR_0136 copy.jpg" alt="Liza Kopylova" />

    <h1>hi! 💫 this is Liza's page</h1>
    <p>I am currently a talent resident at <a href="https://adaptionlabs.ai/">Adaption</a>, 
      a frontier AI lab that builds systems that adapt in real time.</p>
    <p>In my free time you will find me hiking, reading about ancient history, or playing Stardew Valley.</p>

    <div class="links">
      <a href="https://www.linkedin.com/in/elizavetakopylova/">linkedin</a>
      <a href="https://x.com/lizasanon">twitter (x)</a>
    </div>
  </main>
</body>
</html>
